services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-claudius}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-claudius}
      POSTGRES_DB: ${DB_NAME:-claudius}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-claudius}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - garth_tokens:/tmp/garth_tokens
      - hf_cache:/root/.cache/huggingface
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-claudius}:${DB_PASSWORD:-claudius}@postgres:5432/${DB_NAME:-claudius}
      REDIS_URL: redis://redis:6379
      WATCHFILES_FORCE_POLLING: "true"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
  garth_tokens:
  hf_cache:
