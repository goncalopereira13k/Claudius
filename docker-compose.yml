services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claudius
      POSTGRES_PASSWORD: claudius
      POSTGRES_DB: claudius
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudius"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://claudius:claudius@postgres:5432/claudius
      REDIS_URL: redis://redis:6379

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  telegram-bot:
    build: ./telegram-bot
    env_file: .env
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000

volumes:
  pgdata:
